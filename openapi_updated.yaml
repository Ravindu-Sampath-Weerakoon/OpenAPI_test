openapi: 3.1.0
info:
  title: ESP32 Vehicle Submodule API
  version: 1.0.0
  description: |
    Concise User Manual / Integration Guide

    This API is hosted by one ESP32 configured as a Wi-Fi Access Point.
    The ESP32 hosts a web server on port 80 and returns a JSON response at:
    http://192.168.8.171/

    Integration steps for another development team:
    1. Connect to the ESP32 Wi-Fi Access Point.
    2. Send an HTTP GET request to http://192.168.8.171/
    3. Read the JSON response.
    4. If status is "success" and data.canOperate is true, the main controller can continue using the module.
    5. If status is "success" but warnings are present, the system can still operate, but the controller should display/log the warning.
    6. If status is "error" or data.canOperate is false, the main controller must stop or ignore this module until the error is fixed.

    Warning vs Error rule:
    - Warning: module can still work.
    - Error: module cannot safely work.
servers:
  - url: http://192.168.8.171
    description: ESP32 Wi-Fi Access Point web server on port 80
paths:
  /:
    get:
      summary: Get vehicle submodule JSON status
      description: Returns the assigned vehicle submodule status, data, warnings, and error information.
      operationId: getVehicleSubmoduleStatus
      responses:
        '200':
          description: JSON response from the ESP32 vehicle submodule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleSubmoduleResponse'
              examples:
                success:
                  summary: Normal working response
                  value:
                    module: vehicle_submodule
                    status: success
                    message: Module is working normally
                    data:
                      id: 1
                      canOperate: true
                      mode: active
                      batteryVoltage: 7.4
                      signalStrength: -45
                      sensorStatus:
                        ultrasonic: ok
                        irSensor: ok
                        motorDriver: ok
                      readings:
                        distanceCm: 35.2
                        speedRpm: 120
                      warnings: []
                    error:
                      code: 0
                      message: none
                warning:
                  summary: Warning response; system can still operate
                  value:
                    module: vehicle_submodule
                    status: success
                    message: Module is working with warning
                    data:
                      id: 1
                      canOperate: true
                      mode: active
                      batteryVoltage: 6.6
                      signalStrength: -70
                      sensorStatus:
                        ultrasonic: ok
                        irSensor: ok
                        motorDriver: ok
                      readings:
                        distanceCm: 42.8
                        speedRpm: 95
                      warnings:
                        - code: WARN_LOW_BATTERY
                          message: Battery voltage is low, but module can still operate
                          severity: warning
                    error:
                      code: 0
                      message: none
                error:
                  summary: Error response; system cannot operate safely
                  value:
                    module: vehicle_submodule
                    status: error
                    message: Module cannot operate due to sensor failure
                    data:
                      id: 1
                      canOperate: false
                      mode: fault
                      batteryVoltage: 7.2
                      signalStrength: -50
                      sensorStatus:
                        ultrasonic: failed
                        irSensor: ok
                        motorDriver: ok
                      readings:
                        distanceCm: null
                        speedRpm: 0
                      warnings: []
                    error:
                      code: ERR_SENSOR_FAILURE
                      message: Ultrasonic sensor is not responding
  /ping:
    get:
      summary: Server check
      description: Simple health check endpoint for testing whether the ESP32 web server is online.
      operationId: pingServer
      responses:
        '200':
          description: Server is online
          content:
            application/json:
              schema:
                type: object
                required:
                  - module
                  - status
                  - message
                properties:
                  module:
                    type: string
                    example: vehicle_submodule
                  status:
                    type: string
                    enum:
                      - success
                  message:
                    type: string
                    example: ESP32 server is online
components:
  schemas:
    VehicleSubmoduleResponse:
      type: object
      required:
        - module
        - status
        - message
        - data
        - error
      properties:
        module:
          type: string
          description: Name of the assigned vehicle submodule.
          example: vehicle_submodule
        status:
          type: string
          description: Overall result of the module response.
          enum:
            - success
            - error
          example: success
        message:
          type: string
          description: Human-readable summary of the current module state.
          example: Module is working normally
        data:
          $ref: '#/components/schemas/VehicleSubmoduleData'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    VehicleSubmoduleData:
      type: object
      required:
        - id
        - canOperate
        - mode
        - sensorStatus
        - readings
        - warnings
      properties:
        id:
          type: integer
          description: Unique identifier for the module within the network.
          example: 1
        canOperate:
          type: boolean
          description: True means the vehicle can continue operating with this module. False means operation must stop or the module must be ignored.
          example: true
        mode:
          type: string
          description: Current operating mode of the module.
          enum:
            - active
            - standby
            - fault
          example: active
        batteryVoltage:
          type: number
          format: float
          description: Current module battery voltage in volts.
          example: 7.4
        signalStrength:
          type: integer
          description: Wi-Fi signal strength in dBm.
          example: -45
        sensorStatus:
          type: object
          description: Status of hardware parts connected to the ESP32 module.
          additionalProperties:
            type: string
            enum:
              - ok
              - warning
              - failed
              - not_connected
          example:
            ultrasonic: ok
            irSensor: ok
            motorDriver: ok
        readings:
          type: object
          description: Live readings sent from the module to the main controller board.
          properties:
            distanceCm:
              type:
                - number
                - 'null'
              format: float
              description: Distance reading in centimeters.
              example: 35.2
            speedRpm:
              type: integer
              description: Motor speed in revolutions per minute.
              example: 120
          additionalProperties: true
        warnings:
          type: array
          description: Warning list. The system can still operate when warnings exist.
          items:
            $ref: '#/components/schemas/WarningInfo'
    WarningInfo:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          description: Warning code for the main controller.
          enum:
            - WARN_LOW_BATTERY
            - WARN_WEAK_WIFI
            - WARN_SENSOR_UNSTABLE
            - WARN_HIGH_TEMPERATURE
          example: WARN_LOW_BATTERY
        message:
          type: string
          description: Human-readable warning message.
          example: Battery voltage is low, but module can still operate
        severity:
          type: string
          enum:
            - warning
          example: warning
    ErrorInfo:
      type: object
      required:
        - code
        - message
      properties:
        code:
          oneOf:
            - type: integer
            - type: string
          description: 0 when there is no error. Error code when status is error.
          examples:
            - 0
            - ERR_SENSOR_FAILURE
        message:
          type: string
          description: Error description. Use "none" when there is no error.
          example: none
