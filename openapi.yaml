openapi: 3.1.0
info:
  title: Vehicle Body Control API
  version: 1.2.0
  description: |
    Concise User Manual / Integration Guide for the Door, Centre Lock, Power Mirror and Rear Boot Door Control module.

    **Networking Details:**
    This API is hosted by an ESP32 in **Station (STA) Mode**. It connects to 'Dialog 4G 048' and uses a dynamic IP address.

    **Mirror Position Logic:**
    - **Positive (+)**: Tilted Right/Up.
    - **Negative (-)**: Tilted Left/Down.
    - **Zero (0)**: Centered.

servers:
  - url: http://{esp32_ip}
    description: ESP32 Web Server (Dynamic IP)
    variables:
      esp32_ip:
        default: "192.168.x.x"
        description: The dynamic IP address assigned to the ESP32 (check Serial Monitor).
paths:
  /:
    get:
      summary: Get vehicle body control status
      description: Returns the full status of all body control sub-systems.
      operationId: getVehicleBodyControlStatus
      responses:
        '200':
          description: Detailed JSON response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleBodyControlResponse'
              examples:
                success:
                  summary: Normal working response
                  value:
                    module: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
                    status: success
                    message: Vehicle body control data retrieved successfully
                    driveStatus: SAFE_TO_DRIVE
                    riskMessage: No body control risk detected.
                    data:
                      front_left_door_status: closed
                      front_right_door_status: closed
                      rear_left_door_status: closed
                      rear_right_door_status: closed
                      centre_lock_status: locked
                      power_mirror_left_position: 12
                      power_mirror_right_position: -5
                      rear_boot_door_status: closed
                      error_status: OK
                    error:
                      code: 0
                      message: "None"
components:
  schemas:
    VehicleBodyControlResponse:
      type: object
      required: [module, status, message, driveStatus, riskMessage, data, error]
      properties:
        module:
          type: string
          description: "**(String)** The name of the specific hardware module. Identifies this as the Body Control unit."
          example: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
        status:
          type: string
          description: "**(Enum: success, error)** The high-level result of the request. 'success' means data was read from sensors."
          example: success
        message:
          type: string
          description: "**(String)** A human-readable summary of the current system state."
          example: Vehicle body control data retrieved successfully
        driveStatus:
          type: string
          description: "**(String)** Safety flag for the main vehicle controller. Usually 'SAFE_TO_DRIVE' or 'RISK_DETECTED'."
          example: SAFE_TO_DRIVE
        riskMessage:
          type: string
          description: "**(String)** Explains why a risk was detected (e.g., 'Front Left Door Open')."
          example: No body control risk detected.
        data:
          $ref: '#/components/schemas/VehicleBodyControlData'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    VehicleBodyControlData:
      type: object
      description: "Contains the live hardware sensor readings."
      required:
        - front_left_door_status
        - front_right_door_status
        - rear_left_door_status
        - rear_right_door_status
        - centre_lock_status
        - power_mirror_left_position
        - power_mirror_right_position
        - rear_boot_door_status
        - error_status
      properties:
        front_left_door_status:
          type: string
          description: "**(String: open/closed)** Current physical state of the front-left door."
          example: closed
        front_right_door_status:
          type: string
          description: "**(String: open/closed)** Current physical state of the front-right door."
          example: closed
        rear_left_door_status:
          type: string
          description: "**(String: open/closed)** Current physical state of the rear-left door."
          example: closed
        rear_right_door_status:
          type: string
          description: "**(String: open/closed)** Current physical state of the rear-right door."
          example: closed
        centre_lock_status:
          type: string
          description: "**(String: locked/unlocked)** State of the central locking system for all passenger doors."
          example: locked
        power_mirror_left_position:
          type: integer
          description: "**(Integer)** Displacement of left mirror. Positive = Up/Right, Negative = Down/Left, 0 = Center."
          example: 12
        power_mirror_right_position:
          type: integer
          description: "**(Integer)** Displacement of right mirror. Positive = Up/Right, Negative = Down/Left, 0 = Center."
          example: -5
        rear_boot_door_status:
          type: string
          description: "**(String: open/closed)** Current physical state of the trunk/boot door."
          example: closed
        error_status:
          type: string
          description: "**(String)** Internal diagnostic code from the ESP32 sensors (e.g., 'OK', 'SENSOR_UNPLUGGED')."
          example: OK
    ErrorInfo:
      type: object
      required: [code, message]
      properties:
        code:
          oneOf: [{type: integer}, {type: string}]
          description: "**(Int/String)** Numerical error code. '0' indicates no system-level error."
          example: 0
        message:
          type: string
          description: "**(String)** Detailed description of any system-level crash or failure. 'None' if healthy."
          example: "None"
