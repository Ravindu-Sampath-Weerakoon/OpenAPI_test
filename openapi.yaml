openapi: 3.1.0
info:
  title: Vehicle Body Control API
  version: 1.0.0
  description: |
    Concise User Manual / Integration Guide for the Door, Centre Lock, Power Mirror and Rear Boot Door Control module.

    This API is hosted by one ESP32 configured as a Wi-Fi Access Point.
    The ESP32 hosts a web server on port 80 and returns a JSON response at:
    http://192.168.8.171/

    Integration steps for another development team:
    1. Connect to the ESP32 Wi-Fi Access Point.
    2. Send an HTTP GET request to http://192.168.8.171/
    3. Read the JSON response.
    4. If status is "success" and driveStatus is "SAFE_TO_DRIVE", the vehicle can operate safely.
    5. If status is "error" or driveStatus indicates a risk, the controller should take appropriate action.

servers:
  - url: http://192.168.8.171
    description: ESP32 Wi-Fi Access Point web server on port 80
paths:
  /:
    get:
      summary: Get vehicle body control status
      description: Returns the status of doors, centre lock, power mirrors, and rear boot door.
      operationId: getVehicleBodyControlStatus
      responses:
        '200':
          description: JSON response from the vehicle body control module
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleBodyControlResponse'
              examples:
                success:
                  summary: Normal working response
                  value:
                    module: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
                    status: success
                    message: Vehicle body control data retrieved successfully
                    driveStatus: SAFE_TO_DRIVE
                    riskMessage: No body control risk detected.
                    data:
                      front_left_door_status: closed
                      front_right_door_status: closed
                      rear_left_door_status: closed
                      rear_right_door_status: closed
                      centre_lock_status: locked
                      power_mirror_left_position: 12
                      power_mirror_right_position: -5
                      rear_boot_door_status: closed
                      error_status: OK
                    error:
                      code: 0
                      message: "None"
  /ping:
    get:
      summary: Server check
      description: Simple health check endpoint for testing whether the ESP32 web server is online.
      operationId: pingServer
      responses:
        '200':
          description: Server is online
          content:
            application/json:
              schema:
                type: object
                required:
                  - module
                  - status
                  - message
                properties:
                  module:
                    type: string
                    example: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
                  status:
                    type: string
                    enum:
                      - success
                  message:
                    type: string
                    example: ESP32 server is online
components:
  schemas:
    VehicleBodyControlResponse:
      type: object
      required:
        - module
        - status
        - message
        - driveStatus
        - riskMessage
        - data
        - error
      properties:
        module:
          type: string
          description: Name of the assigned vehicle submodule.
          example: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
        status:
          type: string
          description: Overall result of the module response.
          enum:
            - success
            - error
          example: success
        message:
          type: string
          description: Human-readable summary of the current module state.
          example: Vehicle body control data retrieved successfully
        driveStatus:
          type: string
          description: Safety status for driving.
          example: SAFE_TO_DRIVE
        riskMessage:
          type: string
          description: Description of any detected risks.
          example: No body control risk detected.
        data:
          $ref: '#/components/schemas/VehicleBodyControlData'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    VehicleBodyControlData:
      type: object
      required:
        - front_left_door_status
        - front_right_door_status
        - rear_left_door_status
        - rear_right_door_status
        - centre_lock_status
        - power_mirror_left_position
        - power_mirror_right_position
        - rear_boot_door_status
        - error_status
      properties:
        front_left_door_status:
          type: string
          description: Status of the front left door.
          example: closed
        front_right_door_status:
          type: string
          description: Status of the front right door.
          example: closed
        rear_left_door_status:
          type: string
          description: Status of the rear left door.
          example: closed
        rear_right_door_status:
          type: string
          description: Status of the rear right door.
          example: closed
        centre_lock_status:
          type: string
          description: Status of the centre lock.
          example: locked
        power_mirror_left_position:
          type: integer
          description: Position of the left power mirror.
          example: 12
        power_mirror_right_position:
          type: integer
          description: Position of the right power mirror.
          example: -5
        rear_boot_door_status:
          type: string
          description: Status of the rear boot door.
          example: closed
        error_status:
          type: string
          description: Internal module error status.
          example: OK
    ErrorInfo:
      type: object
      required:
        - code
        - message
      properties:
        code:
          oneOf:
            - type: integer
            - type: string
          description: 0 when there is no error. Error code when status is error.
          examples:
            - 0
            - ERR_MODULE_FAILURE
        message:
          type: string
          description: Error description. Use "None" when there is no error.
          example: "None"
