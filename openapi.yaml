openapi: 3.1.0
info:
  title: Vehicle Body Control API
  version: 1.1.1
  description: |
    Concise User Manual / Integration Guide for the Door, Centre Lock, Power Mirror and Rear Boot Door Control module.

    **Networking Details:**
    This API is hosted by an ESP32 configured in **Station (STA) Mode**. 
    It connects to a local Wi-Fi network (e.g., 'Dialog 4G 048') and receives a dynamic IP address from the router.

    **Understanding Mirror Positions:**
    The `power_mirror_left_position` and `power_mirror_right_position` values represent the current displacement from the neutral (center) point.
    - **Positive Values (e.g., 12):** Indicate an offset in the positive axis (typically Up or Right).
    - **Negative Values (e.g., -5):** Indicate an offset in the negative axis (typically Down or Left).
    - **Zero (0):** Indicates the mirror is perfectly centered.

    **Integration steps for development:**
    1. Ensure the ESP32 is powered and connected to the same Wi-Fi network as the client.
    2. Check the ESP32 Serial Monitor to find its **assigned IP address**.
    3. Send an HTTP GET request to `http://<ESP32_IP_ADDRESS>/`
    4. Read the JSON response.
    5. If status is "success" and `driveStatus` is "SAFE_TO_DRIVE", the vehicle can operate safely.

servers:
  - url: http://{esp32_ip}
    description: ESP32 Web Server (Dynamic IP)
    variables:
      esp32_ip:
        default: "192.168.x.x"
        description: The dynamic IP address assigned to the ESP32 by the router (check Serial Monitor).
paths:
  /:
    get:
      summary: Get vehicle body control status
      description: Returns the status of doors, centre lock, power mirrors, and rear boot door.
      operationId: getVehicleBodyControlStatus
      responses:
        '200':
          description: JSON response from the vehicle body control module
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleBodyControlResponse'
              examples:
                success:
                  summary: Normal working response
                  value:
                    module: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
                    status: success
                    message: Vehicle body control data retrieved successfully
                    driveStatus: SAFE_TO_DRIVE
                    riskMessage: No body control risk detected.
                    data:
                      front_left_door_status: closed
                      front_right_door_status: closed
                      rear_left_door_status: closed
                      rear_right_door_status: closed
                      centre_lock_status: locked
                      power_mirror_left_position: 12
                      power_mirror_right_position: -5
                      rear_boot_door_status: closed
                      error_status: OK
                    error:
                      code: 0
                      message: "None"
  /ping:
    get:
      summary: Server check
      description: Simple health check endpoint for testing whether the ESP32 web server is online.
      operationId: pingServer
      responses:
        '200':
          description: Server is online
          content:
            application/json:
              schema:
                type: object
                required:
                  - module
                  - status
                  - message
                properties:
                  module:
                    type: string
                    example: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
                  status:
                    type: string
                    enum:
                      - success
                  message:
                    type: string
                    example: ESP32 server is online
components:
  schemas:
    VehicleBodyControlResponse:
      type: object
      required:
        - module
        - status
        - message
        - driveStatus
        - riskMessage
        - data
        - error
      properties:
        module:
          type: string
          description: Name of the assigned vehicle submodule.
          example: "Door, Centre Lock, Power Mirror and Rear Boot Door Control"
        status:
          type: string
          description: Overall result of the module response.
          enum:
            - success
            - error
          example: success
        message:
          type: string
          description: Human-readable summary of the current module state.
          example: Vehicle body control data retrieved successfully
        driveStatus:
          type: string
          description: Safety status for driving.
          example: SAFE_TO_DRIVE
        riskMessage:
          type: string
          description: Description of any detected risks.
          example: No body control risk detected.
        data:
          $ref: '#/components/schemas/VehicleBodyControlData'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    VehicleBodyControlData:
      type: object
      required:
        - front_left_door_status
        - front_right_door_status
        - rear_left_door_status
        - rear_right_door_status
        - centre_lock_status
        - power_mirror_left_position
        - power_mirror_right_position
        - rear_boot_door_status
        - error_status
      properties:
        front_left_door_status:
          type: string
          description: Status of the front left door.
          example: closed
        front_right_door_status:
          type: string
          description: Status of the front right door.
          example: closed
        rear_left_door_status:
          type: string
          description: Status of the rear left door.
          example: closed
        rear_right_door_status:
          type: string
          description: Status of the rear right door.
          example: closed
        centre_lock_status:
          type: string
          description: Status of the centre lock.
          example: locked
        power_mirror_left_position:
          type: integer
          description: |
            Current horizontal/vertical offset of the left mirror from center.
            - Positive: Right/Up tilt
            - Negative: Left/Down tilt
            - Zero: Centered
          example: 12
        power_mirror_right_position:
          type: integer
          description: |
            Current horizontal/vertical offset of the right mirror from center.
            - Positive: Right/Up tilt
            - Negative: Left/Down tilt
            - Zero: Centered
          example: -5
        rear_boot_door_status:
          type: string
          description: Status of the rear boot door.
          example: closed
        error_status:
          type: string
          description: Internal module error status.
          example: OK
    ErrorInfo:
      type: object
      required:
        - code
        - message
      properties:
        code:
          oneOf:
            - type: integer
            - type: string
          description: 0 when there is no error. Error code when status is error.
          examples:
            - 0
            - ERR_MODULE_FAILURE
        message:
          type: string
          description: Error description. Use "None" when there is no error.
          example: "None"
